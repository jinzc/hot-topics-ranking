name: Update Hot Topics

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write       # 用于 push 代码
  pages: write        # 用于 Pages 部署
  id-token: write     # 用于 OIDC 认证（deploy-pages 需要）

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Update data
        run: python scripts/update_hot_topics.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/hot_data.json
          git commit -m "Update hot topics - $(date +'%Y-%m-%d %H:%M')" || git commit --allow-empty -m "Update timestamp - $(date +'%Y-%m-%d %H:%M')"
          git push https://${GITHUB_TOKEN}@github.com/${{ github.repository }}.git HEAD:main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
