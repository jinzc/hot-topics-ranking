name: Update Hot Topics

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Update data
        run: python scripts/update_hot_topics.py

      - name: Commit via GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 读取文件内容并 base64 编码（修复：使用 tr 去掉换行）
          CONTENT=$(base64 data/hot_data.json | tr -d '\n')
          # 获取当前文件的 SHA
          SHA=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/contents/data/hot_data.json | jq -r '.sha')
          # 通过 API 更新文件
          curl -X PUT             -H "Authorization: Bearer $GITHUB_TOKEN"             -H "Accept: application/vnd.github+json"             https://api.github.com/repos/${{ github.repository }}/contents/data/hot_data.json             -d "{"message":"Update hot topics - $(date +'%Y-%m-%d %H:%M')","content":"$CONTENT","sha":"$SHA"}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
