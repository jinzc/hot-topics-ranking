name: Update Hot Topics

on:
  schedule:
    - cron: '0 * * * *'  # 每小时整点
  workflow_dispatch:     # 手动触发
  push:                  # 每次 push 都触发
    branches: [main]
    paths-ignore:        # 但忽略某些文件的 push
      - 'README.md'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run update script
        id: update
        run: python scripts/update_hot_topics.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/hot_data.json
          git diff --cached --quiet && git commit --allow-empty -m "Update timestamp - $(date +'%Y-%m-%d %H:%M')" || git commit -m "Update hot topics - $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Upload artifact backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hot-data-backup
          path: data/hot_data.json
          retention-days: 7
