name: Update Hot Topics

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run update script
        id: update
        run: python scripts/update_hot_topics.py

      - name: Always commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/hot_data.json
          # 无论是否有变化都提交（通过 --allow-empty 或强制写入）
          git commit -m "Update hot topics - $(date +'%Y-%m-%d %H:%M')" || git commit --allow-empty -m "Update timestamp - $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: Force Pages rebuild
        run: |
          date > .last_build
          git add .last_build
          git commit -m "Rebuild Pages - $(date +'%Y-%m-%d %H:%M')" || true
          git push || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hot-data-backup
          path: data/hot_data.json
          retention-days: 7
