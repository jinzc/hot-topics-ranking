name: Update Hot Topics

on:
  schedule:
    # 7:00-23:00 每小时更新（17次）
    - cron: '0 7-23 * * *'
    # 凌晨 6:00 统一更新一次（覆盖 23:00-6:00 时段）
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Update data
        run: python scripts/update_hot_topics.py

      - name: Commit via GitHub API using Python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import base64
          import json
          import os
          import urllib.request

          repo = "${{ github.repository }}"
          token = os.environ['GITHUB_TOKEN']

          # 读取文件内容
          with open('data/hot_data.json', 'rb') as f:
              content = base64.b64encode(f.read()).decode('utf-8')

          # 获取当前文件的 SHA
          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/contents/data/hot_data.json',
              headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'}
          )
          resp = urllib.request.urlopen(req)
          data = json.loads(resp.read().decode())
          sha = data['sha']

          # 更新文件
          import datetime
          now = datetime.datetime.now().strftime('%Y-%m-%d %H:%M')

          payload = json.dumps({
              'message': f'Update hot topics - {now}',
              'content': content,
              'sha': sha
          }).encode('utf-8')

          req = urllib.request.Request(
              f'https://api.github.com/repos/{repo}/contents/data/hot_data.json',
              data=payload,
              headers={
                  'Authorization': f'Bearer {token}',
                  'Accept': 'application/vnd.github+json',
                  'Content-Type': 'application/json'
              },
              method='PUT'
          )
          resp = urllib.request.urlopen(req)
          print(f"File updated: {resp.status}")
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
