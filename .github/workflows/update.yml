name: Update Hot Topics

on:
  schedule:
    # 7:00-23:00 每小时更新（17次）
    - cron: '0 7-23 * * *'
    # 凌晨 6:00 统一更新一次（覆盖 23:00-6:00 时段）
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Update data
        run: python scripts/update_hot_topics.py

      - name: Commit and push via git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/hot_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update hot topics: $(date +'%Y-%m-%d %H:%M')"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin ${{ github.ref_name }}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
