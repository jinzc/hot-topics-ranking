<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全网热点榜单 - 实时综合排行</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }
        .header {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .update-time { color: #aaa; font-size: 14px; }
        .update-time span { color: #48dbfb; font-weight: 600; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .platform-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .platform-tab {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .platform-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .platform-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .category-tab {
            padding: 10px 22px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .category-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .category-tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }

        .hot-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .hot-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.15);
        }
        .hot-item::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: 16px 0 0 16px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .hot-item:hover::before { opacity: 1; }
        .hot-item.top1::before { background: linear-gradient(to bottom, #ffd700, #ff8c00); opacity: 1; }
        .hot-item.top2::before { background: linear-gradient(to bottom, #c0c0c0, #a0a0a0); opacity: 1; }
        .hot-item.top3::before { background: linear-gradient(to bottom, #cd7f32, #b87333); opacity: 1; }

        .item-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 12px;
        }
        .rank {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.1);
            color: #ccc;
        }
        .rank.top1 { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; }
        .rank.top2 { background: linear-gradient(135deg, #e0e0e0, #a0a0a0); color: #1a1a2e; }
        .rank.top3 { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }

        .title-section { flex: 1; }
        .title {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            line-height: 1.5;
            margin-bottom: 6px;
            text-decoration: none;
            display: block;
        }
        .title:hover { color: #a29bfe; }
        .title .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 8px;
            vertical-align: middle;
        }
        .tag-politics { background: rgba(255,107,107,0.2); color: #ff6b6b; }
        .tag-social { background: rgba(78,205,196,0.2); color: #4ecdc4; }
        .tag-tech { background: rgba(254,202,87,0.2); color: #feca57; }
        .tag-entertainment { background: rgba(255,159,243,0.2); color: #ff9ff3; }
        .tag-sports { background: rgba(84,160,255,0.2); color: #54a0ff; }
        .tag-life { background: rgba(72,219,251,0.2); color: #48dbfb; }
        .tag-finance { background: rgba(255,165,0,0.2); color: #ffa500; }
        .tag-health { background: rgba(152,251,152,0.2); color: #98fb98; }

        .summary { font-size: 13px; color: #888; line-height: 1.6; }

        .platform-heat {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .heat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        .heat-item .platform-name { color: #666; }
        .heat-item .heat-value { font-weight: 700; font-family: 'SF Mono', monospace; }
        .heat-item.weibo .heat-value { color: #ff6b6b; }
        .heat-item.baidu .heat-value { color: #4ecdc4; }
        .heat-item.douyin .heat-value { color: #feca57; }
        .heat-item.bilibili .heat-value { color: #ff9ff3; }
        .heat-item.zhihu .heat-value { color: #54a0ff; }

        .total-heat {
            margin-left: auto;
            padding: 4px 12px;
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            border-radius: 12px;
            border: 1px solid rgba(102,126,234,0.3);
        }
        .total-heat .label { font-size: 11px; color: #888; margin-right: 4px; }
        .total-heat .value { font-size: 14px; font-weight: 700; color: #a29bfe; }

        .trend {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            font-size: 12px;
            margin-left: 8px;
        }
        .trend.up { color: #ff6b6b; }
        .trend.down { color: #4ecdc4; }
        .trend.hot { color: #feca57; }

        .source-links {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .source-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #888;
            font-size: 12px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .source-link:hover {
            background: rgba(255,255,255,0.12);
            color: #ccc;
            border-color: rgba(255,255,255,0.2);
        }
        .source-link .icon { font-size: 10px; }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        .footer {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 13px;
        }
        .footer a { color: #667eea; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        @media (max-width: 768px) {
            .header-content { flex-direction: column; text-align: center; }
            .hot-item { padding: 16px; }
            .title { font-size: 15px; }
            .platform-heat { gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🔥 全网热点榜单</div>
            <div class="update-time">数据更新时间：<span id="update-time">加载中...</span> | 每小时自动更新</div>
        </div>
    </div>

    <div class="container">
        <div class="platform-tabs">
            <div class="platform-tab active" data-platform="all">📊 综合排行</div>
            <div class="platform-tab" data-platform="weibo">🔴 微博热搜</div>
            <div class="platform-tab" data-platform="baidu">🔵 百度热搜</div>
            <div class="platform-tab" data-platform="douyin">🟡 抖音热榜</div>
            <div class="platform-tab" data-platform="bilibili">🟣 B站热搜</div>
            <div class="platform-tab" data-platform="zhihu">🔷 知乎热榜</div>
        </div>

        <div class="category-tabs">
            <div class="category-tab active" data-category="all">📊 全部分类</div>
            <div class="category-tab" data-category="politics">🏛️ 时政</div>
            <div class="category-tab" data-category="social">📰 社会</div>
            <div class="category-tab" data-category="tech">💻 科技</div>
            <div class="category-tab" data-category="entertainment">🎬 娱乐</div>
            <div class="category-tab" data-category="sports">⚽ 体育</div>
            <div class="category-tab" data-category="life">🏠 生活</div>
            <div class="category-tab" data-category="finance">💰 财经</div>
            <div class="category-tab" data-category="health">🏥 健康</div>
        </div>

        <div id="hot-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>正在加载最新热点数据...</p>
            </div>
        </div>

        <div class="footer">
            <p>数据来源：<a href="https://weibo.com/a/hot/realtime" target="_blank">微博热搜</a>、<a href="https://top.baidu.com/board?tab=realtime&platform=pc" target="_blank">百度热搜</a>、<a href="https://rebang.today/" target="_blank">今日热榜</a> 等平台</p>
            <p style="margin-top:8px;">综合热度 = 各平台热度加权求和 | 每小时自动更新 | 点击来源链接可跳转原平台</p>
        </div>
    </div>

    <script>
        const categoryNames = {
            "politics": "时政",
            "social": "社会",
            "tech": "科技",
            "entertainment": "娱乐",
            "sports": "体育",
            "life": "生活",
            "finance": "财经",
            "health": "健康"
        };

        const platformNames = {
            "weibo": "微博",
            "baidu": "百度",
            "douyin": "抖音",
            "bilibili": "B站",
            "zhihu": "知乎"
        };

        let allTopics = [];

        async function loadData() {
            try {
                const response = await fetch('data/hot_data.json?t=' + Date.now());
                const data = await response.json();
                allTopics = data.topics;
                document.getElementById('update-time').textContent = data.updateTime;
                renderTopics(allTopics);
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('hot-list').innerHTML = `
                    <div class="loading">
                        <p style="color:#ff6b6b;">⚠️ 数据加载失败，请刷新页面重试</p>
                        <p style="font-size:12px;margin-top:8px;">错误信息：${error.message}</p>
                    </div>
                `;
            }
        }

        function renderTopics(topics) {
            const container = document.getElementById('hot-list');
            if (topics.length === 0) {
                container.innerHTML = '<div class="loading"><p>暂无数据</p></div>';
                return;
            }

            let html = '';
            topics.forEach(topic => {
                const totalHeat = Object.values(topic.heat).reduce((a, b) => a + b, 0);

                let topClass = '', rankClass = '';
                if (topic.rank === 1) { topClass = 'top1'; rankClass = 'top1'; }
                else if (topic.rank === 2) { topClass = 'top2'; rankClass = 'top2'; }
                else if (topic.rank === 3) { topClass = 'top3'; rankClass = 'top3'; }

                let trendHtml = '';
                if (topic.trend === 'up') trendHtml = `<span class="trend up">▲ ${topic.trendVal}</span>`;
                else if (topic.trend === 'down') trendHtml = `<span class="trend down">▼ ${topic.trendVal}</span>`;
                else if (topic.trend === 'hot') trendHtml = '<span class="trend hot">🔥 爆</span>';

                const catName = categoryNames[topic.category] || topic.category;

                // 来源链接
                let sourcesHtml = '';
                topic.sources.forEach(src => {
                    sourcesHtml += `<a href="${src.url}" target="_blank" class="source-link"><span class="icon">🔗</span> ${src.name}</a>`;
                });

                // 各平台热度
                let heatHtml = '';
                Object.entries(topic.heat).forEach(([platform, value]) => {
                    if (value > 0) {
                        heatHtml += `
                            <div class="heat-item ${platform}">
                                <span class="platform-name">${platformNames[platform]}</span>
                                <span class="heat-value">${value}万</span>
                            </div>`;
                    }
                });

                const platforms = Object.entries(topic.heat)
                    .filter(([k, v]) => v > 0)
                    .map(([k]) => k)
                    .join(',');

                html += `
                    <div class="hot-item ${topClass}" data-category="${topic.category}" data-platform="${platforms}">
                        <div class="item-header">
                            <div class="rank ${rankClass}">${topic.rank}</div>
                            <div class="title-section">
                                <div class="title">
                                    <span class="tag tag-${topic.category}">${catName}</span>
                                    ${topic.title}
                                    ${trendHtml}
                                </div>
                                <div class="summary">${topic.summary}</div>
                            </div>
                        </div>
                        <div class="platform-heat">
                            ${heatHtml}
                            <div class="total-heat">
                                <span class="label">综合热度</span>
                                <span class="value">${totalHeat.toFixed(1)}万</span>
                            </div>
                        </div>
                        <div class="source-links">
                            <span style="color:#666;font-size:12px;margin-right:4px;">来源：</span>
                            ${sourcesHtml}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 分类切换
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                const category = this.dataset.category;
                const filtered = category === 'all' 
                    ? allTopics 
                    : allTopics.filter(t => t.category === category);
                renderTopics(filtered);
            });
        });

        // 平台切换
        document.querySelectorAll('.platform-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');

                const platform = this.dataset.platform;
                const filtered = platform === 'all'
                    ? allTopics
                    : allTopics.filter(t => t.heat[platform] > 0);
                renderTopics(filtered);
            });
        });

        // 加载数据
        loadData();

        // 每5分钟自动刷新
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
