
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>全网热点榜单 - 实时综合排行📊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .update-time {
            color: rgba(255,255,255,0.9);
            font-size: 0.9em;
            margin-top: 5px;
        }
        .update-time .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .platform-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card .icon { font-size: 2em; margin-bottom: 10px; }
        .stat-card .name { font-size: 0.9em; color: #666; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.5em; font-weight: bold; color: #333; }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .filter-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.9);
            color: #333;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #fff;
            color: #667eea;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .topics-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .topic-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
        }
        .topic-card:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .topic-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .rank {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 0.9em;
            flex-shrink: 0;
        }
        .rank.top3 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .rank.normal { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .topic-title {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            flex: 1;
        }
        .topic-category {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75em;
            color: white;
            background: #667eea;
        }
        .topic-summary {
            color: #666;
            font-size: 0.9em;
            line-height: 1.6;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .topic-stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.85em;
            color: #888;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat-item .platform-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7em;
            color: white;
        }
        .loading, .error {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 全网热点榜单</h1>
            <div class="update-time">
                <span class="live-indicator"></span>
                <span id="update-time">正在加载数据...</span>
            </div>
        </div>

        <div class="platform-stats" id="platform-stats">
            <!-- 动态生成 -->
        </div>

        <div class="filters">
            <button class="filter-btn active" data-category="all">📊 全部分类</button>
            <button class="filter-btn" data-category="politics">🏛️ 时政</button>
            <button class="filter-btn" data-category="social">📰 社会</button>
            <button class="filter-btn" data-category="tech">💻 科技</button>
            <button class="filter-btn" data-category="entertainment">🎬 娱乐</button>
            <button class="filter-btn" data-category="sports">⚽ 体育</button>
            <button class="filter-btn" data-category="life">🏠 生活</button>
            <button class="filter-btn" data-category="finance">💰 财经</button>
            <button class="filter-btn" data-category="health">🏥 健康</button>
        </div>

        <div class="topics-list" id="topics-list">
            <div class="loading">⏳ 正在加载热点数据...</div>
        </div>
    </div>

    <script>
        // 兜底数据（当外部 JSON 加载失败时使用）
        const FALLBACK_DATA = {
            "updateTime": "2026-05-12 17:03",
            "topics": [
                {"title": "习近平同塔吉克斯坦总统拉赫蒙会谈", "category": "social", "summary": "5月12日，国家主席习近平在北京同塔吉克斯坦总统拉赫蒙举行会谈。", "heat": {"weibo": 0, "baidu": 790.4061, "douyin": 0, "bilibili": 0, "zhihu": 0}, "trend": "hot", "trendVal": 0, "sources": [{"name": "百度", "url": "https://top.baidu.com/board?tab=realtime&platform=pc"}], "rank": 1},
                {"title": "超级心脏爆单 订单已排到2028年", "category": "social", "summary": "近日，江苏镇江车间生产的船用中速发动机订单已排至2028年，这款国产超级心脏打破国外技术垄断。", "heat": {"weibo": 0, "baidu": 780.8557, "douyin": 0, "bilibili": 0, "zhihu": 0}, "trend": "hot", "trendVal": 0, "sources": [{"name": "百度", "url": "https://top.baidu.com/board?tab=realtime&platform=pc"}], "rank": 2},
                {"title": "武汉蒜鸟告了蒜鸟：损失超亿元", "category": "finance", "summary": "武汉方言谐音IP蒜鸟2024年9月诞生后迅速走红，2025年销量破百万件。随着IP爆火，大量企业擅自使用其元素。", "heat": {"weibo": 0, "baidu": 771.3961, "douyin": 0, "bilibili": 0, "zhihu": 0}, "trend": "hot", "trendVal": 0, "sources": [{"name": "百度", "url": "https://top.baidu.com/board?tab=realtime&platform=pc"}], "rank": 3}
            ]
        };

        let allTopics = [];
        let currentCategory = 'all';

        // 平台配置
        const platforms = {
            weibo: { name: '微博热搜', icon: '🔴', color: '#e6162d' },
            baidu: { name: '百度热搜', icon: '🔵', color: '#2932e1' },
            douyin: { name: '抖音热榜', icon: '🟡', color: '#000000' },
            bilibili: { name: 'B站热搜', icon: '🟣', color: '#00a1d6' },
            zhihu: { name: '知乎热榜', icon: '🔷', color: '#0084ff' }
        };

        // 获取 JSON 路径（兼容 GitHub Pages 子目录部署）
        function getDataUrl() {
            // 获取当前页面路径，确保 JSON 路径正确
            const basePath = window.location.pathname.replace(/\/[^\/]*$/, '/');
            return (basePath + 'data/hot_data.json').replace(/\/\//g, '/');
        }

        // 加载数据（优先从外部 JSON）
        async function loadData() {
            const listContainer = document.getElementById('topics-list');
            const timeEl = document.getElementById('update-time');

            try {
                const dataUrl = getDataUrl() + '?t=' + Date.now();
                console.log('Fetching:', dataUrl);

                const response = await fetch(dataUrl);
                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }

                const data = await response.json();
                console.log('Data loaded, topics count:', data.topics ? data.topics.length : 0);

                allTopics = data.topics || [];

                // 更新最后更新时间
                timeEl.textContent = '最后更新：' + (data.updateTime || '未知');

                console.log('✅ 从 data/hot_data.json 加载成功');
            } catch (e) {
                console.warn('⚠️ 外部数据加载失败:', e.message);
                console.warn('使用兜底数据');

                allTopics = FALLBACK_DATA.topics;
                timeEl.textContent = '最后更新：' + FALLBACK_DATA.updateTime + '（离线模式）';
            }

            renderPlatformStats();
            renderTopics();
        }

        // 渲染平台统计
        function renderPlatformStats() {
            const container = document.getElementById('platform-stats');
            const stats = {};

            // 计算各平台总热度
            allTopics.forEach(topic => {
                Object.entries(topic.heat || {}).forEach(([platform, value]) => {
                    if (value > 0) {
                        stats[platform] = (stats[platform] || 0) + value;
                    }
                });
            });

            container.innerHTML = Object.entries(platforms).map(([key, config]) => {
                const value = stats[key] || 0;
                const displayValue = value > 10000 ? (value / 10000).toFixed(1) + '万' : value.toFixed(1);
                return `
                    <div class="stat-card">
                        <div class="icon">${config.icon}</div>
                        <div class="name">${config.name}</div>
                        <div class="value">${displayValue}</div>
                    </div>
                `;
            }).join('');
        }

        // 渲染话题列表
        function renderTopics() {
            const container = document.getElementById('topics-list');

            let filtered = allTopics;
            if (currentCategory !== 'all') {
                filtered = allTopics.filter(t => t.category === currentCategory);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="loading">该分类暂无数据</div>';
                return;
            }

            container.innerHTML = filtered.map((topic, index) => {
                const rank = topic.rank || (index + 1);
                const isTop3 = rank <= 3;

                // 计算综合热度
                const totalHeat = Object.values(topic.heat || {}).reduce((a, b) => a + b, 0);
                const heatDisplay = totalHeat > 10000 ? (totalHeat / 10000).toFixed(1) + '万' : totalHeat.toFixed(1);

                // 各平台热度显示
                const heatStats = Object.entries(topic.heat || {})
                    .filter(([_, val]) => val > 0)
                    .map(([platform, val]) => {
                        const config = platforms[platform] || { icon: '●', color: '#999' };
                        const display = val > 10000 ? (val / 10000).toFixed(1) + '万' : val.toFixed(1);
                        return `<span class="stat-item"><span class="platform-icon" style="background:${config.color}">${config.icon}</span>${display}</span>`;
                    }).join('');

                return `
                    <div class="topic-card" onclick="window.open('${(topic.sources && topic.sources[0] && topic.sources[0].url) || '#'}', '_blank')">
                        <div class="topic-header">
                            <div class="rank ${isTop3 ? 'top3' : 'normal'}">${rank}</div>
                            <div class="topic-title">${topic.title}</div>
                            <span class="topic-category">${topic.category}</span>
                        </div>
                        <div class="topic-summary">${topic.summary || ''}</div>
                        <div class="topic-stats">
                            <span class="stat-item">🔥 综合热度：${heatDisplay}</span>
                            ${heatStats}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 分类筛选
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderTopics();
            });
        });

        // 初始化
        loadData();

        // 每 5 分钟自动刷新数据（不刷新整个页面）
        setInterval(loadData, 300000);
    </script>
</body>
</html>
